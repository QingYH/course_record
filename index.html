<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>高等数学 · 学情驾驶舱 · 精算版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',-apple-system,sans-serif; }
        body { background:#080c1a; min-height:100vh; padding:1.5rem; position:relative; overflow-x:hidden; }
        body::before {
            content:'∫ ∮ ∂ ∇ ∞ ∑ π √';
            position:fixed; top:0; left:0; right:0; bottom:0; font-size:8rem;
            color:rgba(255,255,255,0.006); display:flex; align-items:center; justify-content:center;
            pointer-events:none; z-index:0; letter-spacing:4rem; word-break:break-all; line-height:1.3;
            transform:rotate(-2deg) scale(1.1); user-select:none;
        }
        .math-symbols { position:fixed; pointer-events:none; z-index:0; color:rgba(255,255,255,0.010); font-size:6rem; font-weight:300; user-select:none; opacity:0.5; }
        .math-symbols.s1 { top:3%; left:2%; transform:rotate(-6deg); font-size:7rem; color:rgba(96,165,250,0.04); }
        .math-symbols.s2 { bottom:5%; right:2%; transform:rotate(8deg); font-size:9rem; color:rgba(167,139,250,0.035); }
        .math-symbols.s3 { top:35%; right:1%; transform:rotate(12deg); font-size:5rem; color:rgba(251,191,36,0.03); }
        .math-symbols.s4 { bottom:30%; left:1%; transform:rotate(-4deg); font-size:6rem; color:rgba(52,211,153,0.025); }
        .math-symbols.s5 { top:55%; left:50%; transform:translateX(-50%) rotate(3deg); font-size:12rem; color:rgba(255,255,255,0.005); letter-spacing:2rem; }
        .app-container { max-width:1480px; margin:0 auto; position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; justify-content:center; }

        /* 登录页面 */
        .login-page { display:flex; align-items:center; justify-content:center; min-height:80vh; padding:2rem; }
        .login-box { background:rgba(255,255,255,0.03); backdrop-filter:blur(20px); border-radius:2.5rem; padding:3.5rem 3rem; max-width:440px; width:100%; border:1px solid rgba(255,255,255,0.06); box-shadow:0 20px 60px rgba(0,0,0,0.5); text-align:center; }
        .login-box .logo-icon { width:72px; height:72px; background:linear-gradient(135deg,#3b82f6,#8b5cf6); border-radius:1.8rem; display:flex; align-items:center; justify-content:center; color:white; font-size:2.2rem; font-weight:700; margin:0 auto 1.2rem; box-shadow:0 8px 24px rgba(59,130,246,0.25); }
        .login-box h1 { font-size:2rem; font-weight:700; background:linear-gradient(135deg,#60a5fa,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:0.3rem; }
        .login-box .sub { color:rgba(255,255,255,0.2); font-size:0.95rem; margin-bottom:2rem; }
        .login-box .class-badge-login { display:inline-block; background:rgba(251,191,36,0.10); border:1px solid rgba(251,191,36,0.15); color:#fbbf24; padding:0.2rem 1.2rem; border-radius:2rem; font-size:0.85rem; margin-bottom:1.8rem; }
        .login-box input { width:100%; padding:0.9rem 1.4rem; border-radius:3.5rem; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.03); color:#f0f4ff; font-size:1.1rem; outline:none; transition:0.2s; margin-bottom:0.8rem; }
        .login-box input:focus { border-color:rgba(96,165,250,0.2); box-shadow:0 0 0 3px rgba(59,130,246,0.05); }
        .login-box input::placeholder { color:rgba(255,255,255,0.1); }
        .login-box .btn { width:100%; justify-content:center; padding:0.9rem 0; font-size:1.1rem; margin-top:0.5rem; }
        .login-box .error-msg { color:#f87171; font-size:0.85rem; margin-top:0.8rem; min-height:1.5rem; }
        .login-box .hint { color:rgba(255,255,255,0.08); font-size:0.7rem; margin-top:1.2rem; }

        /* 主界面 */
        .header-card { background:rgba(255,255,255,0.03); backdrop-filter:blur(16px); border-radius:2rem; padding:1.4rem 2.2rem; border:1px solid rgba(255,255,255,0.04); box-shadow:0 8px 32px -8px rgba(0,0,0,0.4); margin-bottom:1.8rem; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:1rem; }
        .header-left { display:flex; align-items:center; gap:1.2rem; }
        .header-left .logo { background:linear-gradient(135deg,#3b82f6,#8b5cf6); border-radius:1.4rem; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; width:60px; height:60px; font-size:1.8rem; box-shadow:0 4px 16px rgba(59,130,246,0.2); }
        .header-left h1 { font-size:2.4rem; font-weight:800; background:linear-gradient(135deg,#60a5fa,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-0.02em; }
        .header-left .sub { color:rgba(255,255,255,0.2); font-weight:400; -webkit-text-fill-color:rgba(255,255,255,0.2); font-size:1rem; }
        .header-left .class-badge { font-size:1rem; color:rgba(251,191,36,0.4); font-weight:500; -webkit-text-fill-color:rgba(251,191,36,0.4); margin-left:0.3rem; letter-spacing:0.04em; }
        .header-right { display:flex; flex-wrap:wrap; align-items:center; gap:0.8rem; }
        .student-count-badge { background:rgba(255,255,255,0.04); border-radius:3rem; color:rgba(255,255,255,0.3); border:1px solid rgba(255,255,255,0.04); display:flex; align-items:center; gap:0.6rem; padding:0.6rem 1.8rem; font-size:1.1rem; }
        .student-count-badge i { color:#60a5fa; }
        .student-count-badge strong { color:#93c5fd; font-weight:600; }
        .btn { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); font-weight:600; display:inline-flex; align-items:center; gap:0.6rem; color:rgba(255,255,255,0.5); transition:all 0.25s ease; cursor:pointer; backdrop-filter:blur(4px); padding:0.7rem 1.8rem; border-radius:3rem; font-size:1.1rem; }
        .btn:hover { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.12); transform:translateY(-2px); color:#fff; box-shadow:0 8px 24px rgba(0,0,0,0.3); }
        .btn-primary { background:linear-gradient(135deg,#3b82f6,#6366f1); border:none; color:#fff; }
        .btn-primary:hover { background:linear-gradient(135deg,#60a5fa,#818cf8); color:#fff; box-shadow:0 8px 24px rgba(59,130,246,0.25); }
        .btn-success { background:linear-gradient(135deg,#10b981,#059669); border:none; color:#fff; }
        .btn-success:hover { background:linear-gradient(135deg,#34d399,#10b981); color:#fff; box-shadow:0 8px 24px rgba(16,185,129,0.25); }
        .btn-teal { background:rgba(16,185,129,0.10); border:1px solid rgba(16,185,129,0.12); color:#6ee7b7; }
        .btn-teal:hover { background:rgba(16,185,129,0.18); color:#fff; }
        .btn-gold { background:rgba(251,191,36,0.10); border:1px solid rgba(251,191,36,0.12); color:#fbbf24; }
        .btn-gold:hover { background:rgba(251,191,36,0.18); color:#fff; }
        .teacher-badge { background:rgba(251,191,36,0.10); border:1px solid rgba(251,191,36,0.15); color:#fbbf24; border-radius:2.5rem; padding:0.4rem 1.2rem; display:inline-flex; align-items:center; gap:0.4rem; font-size:0.9rem; }

        /* KPI 卡片 - 超大字号 + 股票风格涨跌幅 */
        .kpi-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:1.5rem; margin-bottom:2rem; }
        .kpi-card { background:rgba(255,255,255,0.02); backdrop-filter:blur(12px); border-radius:2rem; padding:1.5rem 1.2rem; border:1px solid rgba(255,255,255,0.04); text-align:center; transition:0.3s; position:relative; overflow:hidden; }
        .kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg, transparent, var(--accent, #60a5fa), transparent); opacity:0.8; }
        .kpi-card:hover { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.08); transform:translateY(-3px); box-shadow:0 8px 30px -8px rgba(0,0,0,0.4); }
        .kpi-card .label { 
            color:rgba(255,255,255,0.5); 
            text-transform:uppercase; 
            letter-spacing:0.1em; 
            font-weight:700; 
            font-size:1.1rem; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            gap:0.6rem;
        }
        .kpi-card .label i { font-size:1.4rem; opacity:0.9; }
        .kpi-card .value { 
            font-weight:900; 
            margin-top:0.4rem; 
            letter-spacing:-0.02em; 
            font-size:3.4rem; 
            line-height:1.1; 
            text-shadow:0 0 20px rgba(255,255,255,0.06); 
        }
        .kpi-card .value.blue { color:#93c5fd; }
        .kpi-card .value.green { color:#6ee7b7; }
        .kpi-card .value.gold { color:#fbbf24; }
        .kpi-card .value.pink { color:#f9a8d4; }
        .kpi-card .value.orange { color:#fdba74; }
        .kpi-card .value.teal { color:#5eead4; }
        .kpi-card .value.purple { color:#c4b5fd; }

        /* 股票风格涨跌幅区域 */
        .kpi-card .change-section {
            margin-top:0.5rem;
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:0.4rem 0.8rem;
            font-size:0.9rem;
            font-weight:600;
            padding:0.3rem 0.5rem;
            border-radius:1rem;
            background:rgba(255,255,255,0.02);
            border:1px solid rgba(255,255,255,0.03);
        }
        .kpi-card .change-item {
            display:inline-flex;
            align-items:center;
            gap:0.2rem;
            padding:0.1rem 0.4rem;
            border-radius:0.5rem;
        }
        .kpi-card .change-item .period { color:rgba(255,255,255,0.2); font-weight:400; font-size:0.7rem; }
        .kpi-card .change-up { color:#34d399; }
        .kpi-card .change-down { color:#f87171; }
        .kpi-card .change-flat { color:rgba(255,255,255,0.2); }
        .kpi-card .change-item i { font-size:0.7rem; }

        .kpi-card .extra { 
            color:rgba(255,255,255,0.4); 
            font-size:0.85rem; 
            margin-top:0.2rem; 
            display:flex; 
            flex-wrap:wrap; 
            justify-content:center; 
            gap:0.2rem 0.6rem; 
            font-weight:500;
        }
        .kpi-card .extra strong { color:rgba(255,255,255,0.7); font-weight:700; }

        .search-section { background:rgba(255,255,255,0.02); backdrop-filter:blur(12px); border-radius:4rem; padding:0.3rem 0.3rem 0.3rem 2rem; display:flex; flex-wrap:wrap; align-items:center; gap:0.8rem; border:1px solid rgba(255,255,255,0.04); margin-bottom:1.8rem; box-shadow:0 4px 20px -8px rgba(0,0,0,0.3); }
        .search-section i { color:rgba(255,255,255,0.12); font-size:1.2rem; }
        .search-section input { border:none; background:transparent; min-width:150px; flex:1; outline:none; color:rgba(255,255,255,0.7); font-weight:400; font-size:1.2rem; padding:0.8rem 0.5rem; }
        .search-section input::placeholder { color:rgba(255,255,255,0.1); }
        .search-section select { border-radius:3.5rem; border:1px solid rgba(255,255,255,0.04); background:rgba(255,255,255,0.03); color:rgba(255,255,255,0.6); outline:none; cursor:pointer; appearance:none; padding:0.8rem 2.2rem 0.8rem 1.4rem; font-size:1.1rem; background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%2360a5fa" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>'); background-repeat:no-repeat; background-position:right 1.2rem center; background-size:12px; transition:0.2s; }
        .search-section select:focus { border-color:rgba(96,165,250,0.15); }
        .search-section select option { background:#0f1629; color:#c8d6e8; }
        .btn-clear { background:transparent; border:none; color:rgba(255,255,255,0.1); padding:0.5rem 1rem; cursor:pointer; font-size:1.2rem; transition:0.2s; }
        .btn-clear:hover { color:rgba(255,255,255,0.3); }

        .student-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(420px,1fr)); gap:1.2rem; margin:1.2rem 0; }
        .student-card { background:rgba(255,255,255,0.02); backdrop-filter:blur(16px); border-radius:1.8rem; padding:1.4rem 1.5rem 1.2rem; border:1px solid rgba(255,255,255,0.03); transition:all 0.35s ease; box-shadow:0 4px 16px -8px rgba(0,0,0,0.3); cursor:pointer; }
        .student-card:hover { transform:translateY(-4px); background:rgba(255,255,255,0.04); border-color:rgba(96,165,250,0.08); box-shadow:0 12px 36px -12px rgba(0,0,0,0.4); }
        .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem; padding-bottom:0.6rem; border-bottom:1px solid rgba(255,255,255,0.03); }
        .student-name { font-weight:700; color:#f0f4ff; font-size:1.5rem; letter-spacing:-0.2px; }
        .student-rank { background:rgba(96,165,250,0.08); padding:0.2rem 1rem; border-radius:2.5rem; color:rgba(96,165,250,0.5); border:1px solid rgba(96,165,250,0.05); font-size:0.9rem; }
        .score-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.5rem; margin:0.6rem 0 0.2rem; }
        .score-item { background:rgba(255,255,255,0.02); border-radius:1rem; display:flex; justify-content:space-between; align-items:center; font-weight:600; border:1px solid rgba(255,255,255,0.02); transition:0.15s; padding:0.35rem 0.7rem 0.35rem 0.9rem; font-size:1rem; }
        .score-item .score-value { font-weight:700; padding:0 0.6rem; border-radius:0.8rem; font-size:1rem; }
        .score-item.attendance { border-color:rgba(96,165,250,0.20); background:rgba(96,165,250,0.05); }
        .score-item.attendance i { color:#60a5fa; }
        .score-item.attendance .score-value { color:#93c5fd; }
        .score-item.attendance .label-text { color:#93c5fd; }
        .score-item.performance { border-color:rgba(52,211,153,0.20); background:rgba(52,211,153,0.05); }
        .score-item.performance i { color:#34d399; }
        .score-item.performance .score-value { color:#6ee7b7; }
        .score-item.performance .label-text { color:#6ee7b7; }
        .score-item.homework { border-color:rgba(251,191,36,0.20); background:rgba(251,191,36,0.05); }
        .score-item.homework i { color:#fbbf24; }
        .score-item.homework .score-value { color:#fcd34d; }
        .score-item.homework .label-text { color:#fcd34d; }
        .score-item.midterm { border-color:rgba(244,114,182,0.20); background:rgba(244,114,182,0.05); }
        .score-item.midterm i { color:#f472b6; }
        .score-item.midterm .score-value { color:#f9a8d4; }
        .score-item.midterm .label-text { color:#f9a8d4; }
        .score-item.final { border-color:rgba(251,146,60,0.20); background:rgba(251,146,60,0.05); }
        .score-item.final i { color:#fb923c; }
        .score-item.final .score-value { color:#fdba74; }
        .score-item.final .label-text { color:#fdba74; }
        .score-item.daily { border-color:rgba(110,231,183,0.20); background:rgba(110,231,183,0.05); }
        .score-item.daily i { color:#6ee7b7; }
        .score-item.daily .score-value { color:#8eeac7; }
        .score-item.daily .label-text { color:#8eeac7; }
        .score-item.chapter { border-color:rgba(167,139,250,0.15); background:rgba(167,139,250,0.04); }
        .score-item.chapter i { color:#a78bfa; }
        .score-item.chapter .score-value { color:#c4b5fd; }
        .score-item.chapter .label-text { color:#c4b5fd; }
        .score-item.total { grid-column:span 3; background:rgba(251,191,36,0.05); border-color:rgba(251,191,36,0.10); justify-content:center; gap:1.2rem; padding:0.4rem 0.6rem; }
        .score-item.total i { color:#fbbf24; }
        .score-item.total .score-value { background:rgba(251,191,36,0.08); color:#fbbf24; border:1px solid rgba(251,191,36,0.06); font-size:1.3rem; }
        .score-item.total .label-text { color:#fbbf24; }

        .card-actions { margin-top:0.8rem; display:flex; gap:0.5rem; flex-wrap:wrap; border-top:1px solid rgba(255,255,255,0.02); padding-top:0.7rem; }
        .btn-small { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.04); border-radius:2.5rem; font-weight:500; color:rgba(255,255,255,0.3); transition:0.2s; cursor:pointer; display:inline-flex; align-items:center; gap:0.4rem; padding:0.3rem 1.2rem; font-size:0.9rem; }

        .table-wrap { background:rgba(255,255,255,0.02); backdrop-filter:blur(12px); border-radius:1.8rem; padding:0.2rem; border:1px solid rgba(255,255,255,0.03); margin-top:1.2rem; overflow-x:auto; box-shadow:0 4px 20px -8px rgba(0,0,0,0.3); }
        table { width:100%; border-collapse:collapse; min-width:1100px; }
        th { text-align:left; padding:0.7rem 0.7rem; background:rgba(255,255,255,0.02); color:rgba(255,255,255,0.2); font-weight:500; border-bottom:1px solid rgba(255,255,255,0.03); letter-spacing:0.04em; text-transform:uppercase; font-size:0.8rem; }
        td { padding:0.6rem 0.7rem; border-bottom:1px solid rgba(255,255,255,0.02); color:rgba(255,255,255,0.5); font-size:0.95rem; }
        td strong { color:#fbbf24; font-size:1.05rem; }

        #toast { position:fixed; bottom:2.5rem; left:50%; transform:translateX(-50%) translateY(100px); background:rgba(15,23,42,0.95); backdrop-filter:blur(20px); color:#f1f5f9; font-weight:500; box-shadow:0 8px 32px rgba(0,0,0,0.5); z-index:999; border:1px solid rgba(255,255,255,0.05); transition:all 0.4s cubic-bezier(0.22,1,0.36,1); opacity:0; pointer-events:none; padding:0.9rem 2.5rem; border-radius:3.5rem; font-size:1.1rem; white-space:nowrap; }
        #toast.show { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }

        .loading-overlay { text-align:center; padding:5rem 1rem; color:rgba(255,255,255,0.1); }
        .loading-overlay i { font-size:3.5rem; margin-bottom:0.8rem; color:#60a5fa; animation:spin 1s linear infinite; }
        @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

        .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:1000; padding:1rem; }
        .modal-box { background:#121b33; border-radius:2.5rem; padding:2.8rem 2.5rem; max-width:480px; width:100%; border:1px solid rgba(255,255,255,0.06); box-shadow:0 20px 60px rgba(0,0,0,0.6); }
        .modal-box h2 { color:#f0f4ff; margin-bottom:0.3rem; text-align:center; font-size:1.8rem; }
        .modal-box .sub { color:rgba(255,255,255,0.2); text-align:center; margin-bottom:1.8rem; font-size:1rem; }
        .modal-box input { width:100%; border-radius:3.5rem; border:1px solid rgba(255,255,255,0.06); background:rgba(255,255,255,0.03); color:#f0f4ff; outline:none; transition:0.2s; padding:1rem 1.6rem; font-size:1.2rem; }
        .modal-box .btn-row { display:flex; gap:1rem; margin-top:1.5rem; }
        .modal-box .btn-row .btn { flex:1; justify-content:center; font-size:1.1rem; padding:0.9rem 0; }

        .detail-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(8,12,26,0.95); backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:center; z-index:2000; padding:2rem; animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
        .detail-box { background:rgba(255,255,255,0.04); border-radius:3rem; padding:3rem 3.5rem; max-width:800px; width:100%; max-height:90vh; overflow-y:auto; border:1px solid rgba(255,255,255,0.06); box-shadow:0 30px 80px rgba(0,0,0,0.6); }
        .detail-box .close-btn { float:right; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); border-radius:3.5rem; padding:0.5rem 1.5rem; color:rgba(255,255,255,0.3); cursor:pointer; transition:0.2s; }
        .detail-box .student-name-big { font-weight:700; color:#f0f4ff; font-size:2.8rem; margin:0.5rem 0 0.2rem; }
        .detail-box .student-id-big { color:rgba(255,255,255,0.2); font-size:1.1rem; margin-bottom:1.8rem; }

        .detail-score-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; margin:1.2rem 0; }
        .detail-score-item { background:rgba(255,255,255,0.03); border-radius:1.5rem; padding:1rem 1.2rem; text-align:center; border:1px solid rgba(255,255,255,0.04); }
        .detail-score-item .label { color:rgba(255,255,255,0.2); text-transform:uppercase; letter-spacing:0.04em; font-size:0.85rem; }

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script>
        if (typeof Vue === 'undefined') {
            document.body.innerHTML = '<div style="text-align:center;padding:4rem 1rem;color:rgba(255,255,255,0.3);"><i class="fas fa-exclamation-triangle" style="font-size:3rem;color:#ef4444;"></i><p style="margin-top:1rem;font-size:1.2rem;">Vue 加载失败，请检查网络</p></div>';
            console.error('Vue 加载失败');
        } else {
            console.log('Vue 加载成功');
            const SUPABASE_URL = 'https://jujurutxwjlzlfenirdh.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_gUAP6pf0Eb5UGdISQQ0vmQ_5tCiJGSF';
            let supabaseClient = null;
            if (typeof supabase !== 'undefined' && supabase.createClient) {
                try { supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); console.log('Supabase 初始化成功'); } catch (e) { console.warn('Supabase 初始化失败', e); }
            } else { console.warn('Supabase 库未加载'); }

            const LOGIN_PASSWORD = 'math2026';
            const TEACHER_PASSWORD = 'math2026';
            const SCORE_TYPES = {
                attendance: { table: 'attendance_scores', label: '考勤', icon: 'fa-user-check' },
                performance: { table: 'performance_scores', label: '课堂表现', icon: 'fa-chalkboard-teacher' },
                homework: { table: 'homework_scores', label: '平时作业', icon: 'fa-book-open' },
                midterm: { table: 'midterm_scores', label: '期中测试', icon: 'fa-flask' },
                final: { table: 'final_scores', label: '期末考试', icon: 'fa-check-circle' },
                daily: { table: 'daily_scores', label: '每日一题', icon: 'fa-puzzle-piece' },
                chapter: { table: 'chapter_scores', label: '章节考核', icon: 'fa-layer-group' }
            };

            const app = Vue.createApp({
                data() {
                    return {
                        isLoggedIn: false,
                        loginPassword: '',
                        loginError: '',
                        allStudents: [],
                        filteredStudents: [],
                        displayedStudents: [],
                        searchSurname: '',
                        selectedStudentId: '',
                        displayMode: 'grid',
                        studentOptions: [],
                        filteredStudentOptions: [],
                        loading: true,
                        statsReady: false,
                        statsMap: {},
                        showTeacherModal: false,
                        teacherPassword: '',
                        teacherError: '',
                        isTeacher: false,
                        showDetailModal: false,
                        detailStudent: { name: '', id: '', attendance: 0, performance: 0, homework: 0, midterm: 0, final: 0, daily_score: 0, chapter1: 0, chapter2: 0, chapter3: 0, chapter4: 0, chapter5: 0, chapter6: 0, total: 0 },
                        showScoreModal: false,
                        scoreModalStudentId: '',
                        scoreModalStudentName: '',
                        scoreModalType: '',
                        scoreModalTypeLabel: '',
                        scoreModalCurrentTotal: 0,
                        scoreModalValue: '',
                        scoreError: '',
                        // 模拟历史数据用于涨跌幅计算
                        historyData: {}
                    };
                },
                mounted() {
                    console.log('Vue mounted');
                    this.$nextTick(() => { if (this.$refs.loginInput) this.$refs.loginInput.focus(); });
                },
                methods: {
                    verifyLogin() {
                        if (this.loginPassword === LOGIN_PASSWORD) { this.isLoggedIn = true; this.loginError = ''; this.loadAllData(); } else { this.loginError = '❌ 密码错误'; this.loginPassword = ''; this.$nextTick(() => { if (this.$refs.loginInput) this.$refs.loginInput.focus(); }); }
                    },
                    logout() { this.isLoggedIn = false; this.isTeacher = false; this.loginPassword = ''; this.loginError = ''; this.allStudents = []; this.displayedStudents = []; this.showToast('已退出'); },
                    async loadAllData() {
                        this.loading = true;
                        try {
                            if (!supabaseClient) { this.loading = false; this.allStudents = []; this.showToast('⚠️ Supabase 未连接'); return; }
                            const { data: students, error: stuError } = await supabaseClient.from('students').select('*').order('id');
                            if (stuError || !students || students.length === 0) { this.loading = false; this.allStudents = []; this.showToast('⚠️ 无数据'); return; }
                            const scoreData = {};
                            for (const [key, config] of Object.entries(SCORE_TYPES)) {
                                try { const { data, error } = await supabaseClient.from(config.table).select('*'); if (error) console.warn('表读取失败', config.table, error); else scoreData[key] = data || []; } catch (e) { scoreData[key] = []; }
                            }
                            const studentScores = {};
                            students.forEach(s => { studentScores[s.id] = { attendance: 0, performance: 0, homework: 0, midterm: 0, final: 0, daily: 0, chapter: 0, chapter1: 0, chapter2: 0, chapter3: 0, chapter4: 0, chapter5: 0, chapter6: 0, total: 0 }; });
                            // 收集历史数据用于涨跌幅（按日期）
                            const historyMap = {};
                            for (const [key, records] of Object.entries(scoreData)) {
                                records.forEach(record => {
                                    const sid = record.student_id;
                                    if (!historyMap[sid]) historyMap[sid] = {};
                                    if (!historyMap[sid][key]) historyMap[sid][key] = [];
                                    historyMap[sid][key].push({
                                        date: new Date(record.created_at || Date.now()),
                                        score: record.score || 0
                                    });
                                });
                            }
                            this.historyData = historyMap;

                            for (const [key, records] of Object.entries(scoreData)) {
                                records.forEach(record => {
                                    if (studentScores[record.student_id] !== undefined) {
                                        if (key === 'chapter') {
                                            const chNum = record.chapter_number || 1;
                                            const fieldName = 'chapter' + chNum;
                                            if (studentScores[record.student_id][fieldName] !== undefined) studentScores[record.student_id][fieldName] += (record.score || 0);
                                            studentScores[record.student_id].chapter += (record.score || 0);
                                        } else {
                                            studentScores[record.student_id][key] += (record.score || 0);
                                        }
                                    }
                                });
                            }
                            students.forEach(s => { const sc = studentScores[s.id]; sc.total = sc.attendance + sc.performance + sc.homework + sc.midterm + sc.final + sc.daily + sc.chapter; });
                            this.allStudents = students.map(s => {
                                const sc = studentScores[s.id] || { attendance: 0, performance: 0, homework: 0, midterm: 0, final: 0, daily: 0, chapter: 0, chapter1: 0, chapter2: 0, chapter3: 0, chapter4: 0, chapter5: 0, chapter6: 0, total: 0 };
                                return { id: s.id, name: s.name, attendance: sc.attendance, performance: sc.performance, homework: sc.homework, midterm: sc.midterm, final: sc.final, daily_score: sc.daily, chapter1: sc.chapter1, chapter2: sc.chapter2, chapter3: sc.chapter3, chapter4: sc.chapter4, chapter5: sc.chapter5, chapter6: sc.chapter6, total: sc.total };
                            });
                            this.allStudents.sort((a, b) => b.total - a.total);
                            this.studentOptions = this.allStudents.map(s => ({ id: s.id, name: s.name }));
                            this.filteredStudentOptions = this.studentOptions.slice();
                            this.filteredStudents = this.allStudents.slice();
                            this.displayedStudents = this.allStudents.slice();
                            this.displayMode = 'grid';
                            this.computeStats();
                            this.showToast('✅ 数据加载成功');
                        } catch (e) { console.warn('加载失败', e); this.allStudents = []; this.showToast('⚠️ 加载失败'); } finally { this.loading = false; }
                    },
                    computeStats() {
                        if (!this.allStudents.length) { this.statsReady = false; return; }
                        const fields = [
                            { key: 'attendance', label: '考勤', color: '#60a5fa', colorClass: 'blue', icon: 'fa-user-check' },
                            { key: 'performance', label: '表现', color: '#34d399', colorClass: 'green', icon: 'fa-chalkboard-teacher' },
                            { key: 'homework', label: '作业', color: '#fbbf24', colorClass: 'gold', icon: 'fa-book-open' },
                            { key: 'midterm', label: '期中', color: '#f472b6', colorClass: 'pink', icon: 'fa-flask' },
                            { key: 'final', label: '期末', color: '#fb923c', colorClass: 'orange', icon: 'fa-check-circle' },
                            { key: 'daily_score', label: '每日一题', color: '#5eead4', colorClass: 'teal', icon: 'fa-puzzle-piece' },
                            { key: 'total', label: '总评', color: '#fbbf24', colorClass: 'gold', icon: 'fa-star' }
                        ];
                        const stats = {};
                        const now = new Date();
                        const dayAgo = new Date(now); dayAgo.setDate(dayAgo.getDate() - 1);
                        const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
                        const monthAgo = new Date(now); monthAgo.setMonth(monthAgo.getMonth() - 1);

                        fields.forEach(f => {
                            const values = this.allStudents.map(s => s[f.key] || 0);
                            const avg = Math.round(values.reduce((a, b) => a + b, 0) / values.length);
                            const maxVal = Math.max(...values);
                            const maxStudent = this.allStudents.find(s => (s[f.key] || 0) === maxVal);
                            const maxName = maxStudent ? maxStudent.name : '-';

                            // 计算涨跌幅：日/周/月 (基于历史数据)
                            const changes = { '日': 0, '周': 0, '月': 0 };
                            // 模拟：基于当前平均值与历史平均值的对比
                            // 从historyData中提取该字段的历史记录
                            let historyScores = [];
                            for (const sid in this.historyData) {
                                const h = this.historyData[sid];
                                if (h[f.key]) {
                                    h[f.key].forEach(item => {
                                        historyScores.push({ date: item.date, score: item.score });
                                    });
                                }
                            }
                            // 按日期分组计算每日平均
                            const dailyAvgs = {};
                            historyScores.forEach(item => {
                                const d = item.date.toISOString().slice(0,10);
                                if (!dailyAvgs[d]) dailyAvgs[d] = [];
                                dailyAvgs[d].push(item.score);
                            });
                            const dates = Object.keys(dailyAvgs).sort();
                            if (dates.length > 0) {
                                // 日增幅: 今天 vs 昨天
                                const today = now.toISOString().slice(0,10);
                                const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
                                const yStr = yesterday.toISOString().slice(0,10);
                                if (dailyAvgs[today] && dailyAvgs[yStr]) {
                                    const todayAvg = dailyAvgs[today].reduce((a,b) => a+b, 0) / dailyAvgs[today].length;
                                    const yAvg = dailyAvgs[yStr].reduce((a,b) => a+b, 0) / dailyAvgs[yStr].length;
                                    changes['日'] = Math.round((todayAvg - yAvg) / (yAvg || 1) * 100);
                                } else {
                                    // 如果没有今天数据，用最近两天
                                    const last2 = dates.slice(-2);
                                    if (last2.length === 2) {
                                        const d1 = dailyAvgs[last2[0]].reduce((a,b) => a+b, 0) / dailyAvgs[last2[0]].length;
                                        const d2 = dailyAvgs[last2[1]].reduce((a,b) => a+b, 0) / dailyAvgs[last2[1]].length;
                                        changes['日'] = Math.round((d2 - d1) / (d1 || 1) * 100);
                                    }
                                }
                                // 周增幅: 最近7天 vs 前7天
                                const weekDates = dates.filter(d => new Date(d) >= weekAgo);
                                const prevWeekDates = dates.filter(d => new Date(d) < weekAgo && new Date(d) >= new Date(weekAgo.getTime() - 7*24*60*60*1000));
                                if (weekDates.length > 0 && prevWeekDates.length > 0) {
                                    const wAvg = weekDates.reduce((sum, d) => sum + (dailyAvgs[d].reduce((a,b) => a+b, 0) / dailyAvgs[d].length), 0) / weekDates.length;
                                    const pAvg = prevWeekDates.reduce((sum, d) => sum + (dailyAvgs[d].reduce((a,b) => a+b, 0) / dailyAvgs[d].length), 0) / prevWeekDates.length;
                                    changes['周'] = Math.round((wAvg - pAvg) / (pAvg || 1) * 100);
                                }
                                // 月增幅: 最近30天 vs 前30天
                                const monthDates = dates.filter(d => new Date(d) >= monthAgo);
                                const prevMonthDates = dates.filter(d => new Date(d) < monthAgo && new Date(d) >= new Date(monthAgo.getTime() - 30*24*60*60*1000));
                                if (monthDates.length > 0 && prevMonthDates.length > 0) {
                                    const mAvg = monthDates.reduce((sum, d) => sum + (dailyAvgs[d].reduce((a,b) => a+b, 0) / dailyAvgs[d].length), 0) / monthDates.length;
                                    const pMAvg = prevMonthDates.reduce((sum, d) => sum + (dailyAvgs[d].reduce((a,b) => a+b, 0) / dailyAvgs[d].length), 0) / prevMonthDates.length;
                                    changes['月'] = Math.round((mAvg - pMAvg) / (pMAvg || 1) * 100);
                                }
                            }

                            stats[f.key] = {
                                label: f.label, icon: f.icon, color: f.color, colorClass: f.colorClass,
                                avg: avg, maxVal: maxVal, maxName: maxName,
                                changes: changes
                            };
                        });
                        this.statsMap = stats;
                        this.statsReady = true;
                    },
                    filterBySurname() {
                        const sur = this.searchSurname.trim();
                        if (!sur) { this.filteredStudentOptions = this.studentOptions.slice(); this.filteredStudents = this.allStudents.slice(); this.displayedStudents = this.allStudents.slice(); return; }
                        const filtered = this.allStudents.filter(s => s.name.startsWith(sur));
                        this.filteredStudents = filtered; this.displayedStudents = filtered; this.filteredStudentOptions = filtered.map(s => ({ id: s.id, name: s.name })); this.displayMode = 'grid';
                    },
                    onSelectStudent() {
                        if (!this.selectedStudentId) { this.displayedStudents = this.filteredStudents.length ? this.filteredStudents : this.allStudents; return; }
                        const target = this.allStudents.find(s => s.id === this.selectedStudentId);
                        if (target) { this.displayedStudents = [target]; this.displayMode = 'grid'; this.searchSurname = target.name.charAt(0); }
                    },
                    showDetail(student) { this.detailStudent = student; this.showDetailModal = true; },
                    showAllStudents() { this.displayedStudents = this.filteredStudents.length ? this.filteredStudents : this.allStudents; this.displayMode = 'grid'; this.selectedStudentId = ''; this.searchSurname = ''; this.filteredStudentOptions = this.studentOptions.slice(); },
                    clearSearch() { this.searchSurname = ''; this.selectedStudentId = ''; this.filteredStudents = this.allStudents.slice(); this.displayedStudents = this.allStudents.slice(); this.filteredStudentOptions = this.studentOptions.slice(); this.displayMode = 'grid'; },
                    openTeacherModal() { this.showTeacherModal = true; this.teacherPassword = ''; this.teacherError = ''; this.$nextTick(() => { if (this.$refs.passwordInput) this.$refs.passwordInput.focus(); }); },
                    closeTeacherModal() { this.showTeacherModal = false; this.teacherPassword = ''; this.teacherError = ''; },
                    verifyTeacher() { if (this.teacherPassword === TEACHER_PASSWORD) { this.isTeacher = true; this.closeTeacherModal(); this.showToast('✅ 教师模式已开启'); } else { this.teacherError = '❌ 密码错误'; this.teacherPassword = ''; this.$nextTick(() => { if (this.$refs.passwordInput) this.$refs.passwordInput.focus(); }); } },
                    showAddScoreModal(studentId, type) {
                        if (!this.isTeacher) { this.showToast('⚠️ 请先开启教师模式'); return; }
                        const stu = this.allStudents.find(s => s.id === studentId); if (!stu) return;
                        const config = SCORE_TYPES[type]; if (!config) return;
                        let currentTotal = 0;
                        if (type === 'chapter') currentTotal = (stu.chapter1 || 0) + (stu.chapter2 || 0) + (stu.chapter3 || 0) + (stu.chapter4 || 0) + (stu.chapter5 || 0) + (stu.chapter6 || 0);
                        else if (type === 'daily') currentTotal = stu.daily_score || 0;
                        else currentTotal = stu[type] || 0;
                        this.scoreModalStudentId = studentId; this.scoreModalStudentName = stu.name; this.scoreModalType = type; this.scoreModalTypeLabel = config.label; this.scoreModalCurrentTotal = currentTotal; this.scoreModalValue = ''; this.scoreError = ''; this.showScoreModal = true;
                        this.$nextTick(() => { const inputs = document.querySelectorAll('.modal-box input'); if (inputs.length) inputs[inputs.length - 1].focus(); });
                    },
                    closeScoreModal() { this.showScoreModal = false; this.scoreModalValue = ''; this.scoreError = ''; },
                    async confirmAddScore() {
                        if (!this.isTeacher) { this.showToast('⚠️ 请先开启教师模式'); return; }
                        const val = this.scoreModalValue.trim(); if (val === '') { this.scoreError = '请输入分数'; return; }
                        const score = Number(val); if (isNaN(score)) { this.scoreError = '请输入有效数字'; return; }
                        const studentId = this.scoreModalStudentId; const type = this.scoreModalType; const config = SCORE_TYPES[type];
                        try {
                            const insertData = { student_id: studentId, score: score, created_at: new Date().toISOString() };
                            if (type === 'chapter') {
                                const chNum = prompt('请输入章节编号 (1-6):', '1');
                                if (chNum === null) return;
                                const ch = parseInt(chNum);
                                if (isNaN(ch) || ch < 1 || ch > 6) { this.scoreError = '请输入1-6之间的数字'; return; }
                                insertData.chapter_number = ch;
                            }
                            const { error } = await supabaseClient.from(config.table).insert([insertData]).select();
                            if (error) { this.scoreError = '添加失败: ' + error.message; return; }
                            this.showToast(`✅ ${this.scoreModalStudentName} 的「${config.label}」已添加 ${score} 分`);
                            this.closeScoreModal();
                            this.isTeacher = false;
                            await this.loadAllData();
                        } catch (e) { this.scoreError = '添加异常: ' + (e.message || ''); }
                    },
                    exportExcel() {
                        if (!this.displayedStudents.length) { this.showToast('暂无数据'); return; }
                        const data = this.displayedStudents.map((s, idx) => ({ '排名': idx + 1, '学号': s.id, '姓名': s.name, '考勤': s.attendance, '课堂表现': s.performance, '平时作业': s.homework, '期中': s.midterm, '期末': s.final, '每日一题': s.daily_score || 0, '第1章': s.chapter1 || 0, '第2章': s.chapter2 || 0, '第3章': s.chapter3 || 0, '第4章': s.chapter4 || 0, '第5章': s.chapter5 || 0, '第6章': s.chapter6 || 0, '总评': s.total }));
                        const wb = XLSX.utils.book_new(); const ws = XLSX.utils.json_to_sheet(data); XLSX.utils.book_append_sheet(wb, ws, '高数成绩'); XLSX.writeFile(wb, `高等数学_${new Date().toISOString().slice(0,10)}.xlsx`); this.showToast('✅ 导出成功');
                    },
                    showToast(msg) { const el = document.getElementById('toast'); if (!el) return; el.textContent = msg; el.classList.add('show'); clearTimeout(this.toastTimer); this.toastTimer = setTimeout(() => { el.classList.remove('show'); }, 4000); }
                }
            });
            app.mount('#app');
            console.log('Vue app 已挂载');
        }
    </script>
